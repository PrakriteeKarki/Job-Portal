{% extends "base.html" %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card shadow-sm border-0 text-center p-4" style="max-width: 500px; width: 100%;">

        <!-- Icon -->
        <div class="mb-3">
            <span style="font-size: 60px;">📧</span>
        </div>

        <!-- Title -->
        <h3 class="fw-bold text-primary">Check Your Email</h3>

        <!-- Message -->
        <p class="text-muted mt-3">
            We have sent a verification link to your email address.<br>
            Please check your inbox and click the link to activate your account.
        </p>

        <!-- Extra info -->
        <div class="alert alert-info mt-3 mb-0" role="alert">
            Didn’t receive the email? Check your spam folder.
        </div>

        <!-- Button (optional redirect to login) -->
        <a href="{% url 'login' %}" class="btn btn-primary mt-4">
            Go to Login
        </a>

    </div>

</div>

{% endblock %}
